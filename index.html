<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MCU Character Slider</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="bg-glow"></div>

  <header>

    <h1>MARVEL</h1>

    <nav>
      <a href="#">Heroes</a>
      <a href="#">Universe</a>
      <a href="#">Timeline</a>
    </nav>

  </header>

  <section class="main-section">

    <h3 class="title">SELECT YOUR HERO</h3>

    <div class="slider-container">

      <button class="nav-btn left">❮</button>

      <div class="slider">

        <div class="card thor">

          <img src="assets/thor.png" alt="Thor">

          <h2>THOR</h2>

          <p>God Of Thunder</p>

        </div>

        <div class="card active ironman">

          <img src="assets/tony.png" alt="Tony Stark">

          <h2>TONY STARK</h2>

          <p>Genius Billionaire</p>

        </div>

        <div class="card spiderman">

          <img src="assets/spidy.png" alt="Peter Parker">

          <h2>PETER PARKER</h2>

          <p>Friendly Neighborhood</p>

        </div>

      </div>

      <button class="nav-btn right">❯</button>

    </div>

  </section>

  <script src="script.js"></script>

</body>
</html>
